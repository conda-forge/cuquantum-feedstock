# Require glibc 2.28 for all variants (including CUDA 12.x where the global
# pinning defaults to 2.17). Entries must mirror the global pinning selectors
# exactly to preserve zip_keys alignment.
# See: https://github.com/conda-forge/conda-smithy/issues/1950
# Working pattern from: https://github.com/conda-forge/nccl-feedstock/pull/154
c_stdlib_version:              # [linux]
  - 2.28                       # [linux]
  - 2.28                       # [linux and not ppc64le and os.environ.get("CF_CUDA_ENABLED", "False") == "True"]


mpi:
  - nompi
  - openmpi

# This is to make sure "mpi" above is *NOT* used to compute the package hash. For "cutensornet"
# the non-colliding hashes are acceptable (though not preferred if avoidable) because we
# wanted 2 flavors of "cutensornet" generated. But, for the "cuquantum" metapackage if the
# hashes are not colliding we'd also generate 3 packages (one for each "mpi" flavor), despite
# it has nothing to do with MPI. We better make sure we have colliding hashes, so that only
# 1 unique upload would be done by the CI.
ignore_version:
  - mpi